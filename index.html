<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>COC Youth Meeting</title>
  <meta lang="ar">
  <meta dir="rtl">
  <link rel="stylesheet" href="assets/css/index.css">
  <script type="module" src="assets/js/index.js" defer></script>
  <script src="assets/js/tools-js/qrcode-scanner.js" defer></script>
  <link rel="stylesheet" href="assets/icons/font/style.css">
</head>

<body>
  <section id="qrcodePage"><div class="icon-cancel" id="cancelQrBtn"></div></section>
  <section id="MainContainer">
    <homePage id="homePage">
      <div class="loadingContainer">
        <div class="icon-spinner"></div>
        <div class="loadingText"></div>
      </div>
    </homePage>
    <rankPage id="rankPage">
      <div class="loadingContainer">
        <div class="icon-spinner"></div>
        <div class="loadingText"></div>
      </div>
    </rankPage>
    <comunityPage id="comunityPage">
      <div class="loadingContainer">
        <div class="icon-spinner"></div>
        <div class="loadingText"></div>
      </div>
    </comunityPage>
    <profilePage id="profilePage">
      <div class="loadingContainer">
        <div class="icon-spinner"></div>
        <div class="loadingText"></div>
      </div>
    </profilePage>
  </section>
  <footer id="footer">
    <div id="selectedArea"></div>
    <section id="footerContainer">
      <a href="#homePage" id="homePageFooter" class="selected">
        <div class="icon-home"></div>
        <p>الرئيسية</p>
      </a>
      <a href="#rankPage" id="rankPageFooter">
        <div class="icon-trophy"></div>
        <p>المراكز</p>
      </a>
      <a id="qrScanFooter">
        <div class="icon-qr"></div>
        <p>سكان QR</p>
      </a>
      <a href="#comunityPage" id="comunityPageFooter">
        <div class="icon-comunity"></div>
        <p>المجتمع</p>
      </a>
      <a href="#profilePage" id="profilePageFooter">
        <div class="icon icon-user"></div>
        <p>الحساب</p>
      </a>
    </section>
  </footer>
</body>

</html>
