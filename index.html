<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COC Youth Meeting</title>
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/icons/style.css">
  <script type="module" src="assets/js/index.js" defer></script>
</head>

<body>
  <header>
    <div>
      <div id="userProfilePic" class="icon-user">
        <img src="" alt="user profile picture" hidden>
      </div>
      <h2>أهلا <div id="userName">صديقى</div>
      </h2>
    </div>
    <div>
      <img src="assets/pic/new coc logo.png" alt="coc logo">
      <h2>COC</h2>
    </div>
    <div>
      <div class="icon-bell unreaded" id="notificationIcon"></div>
      <h2 id="cocsNoDiv">

      </h2>
      <h3 id="userPlaceDiv">المركز: <div id="userPlace">#1</div>

    </div>
  </header>

  <section id="MainContainer">
    <homePage id="homePage">home
      <section id="nextFriday">

      </section>
      <section id="myTasks">

      </section>
    </homePage>
    <rankPage id="rankPage">rank

    </rankPage>
    <comunityPage id="comunityPage">comunity

    </comunityPage>
    <profilePage id="profilePage">profile

    </profilePage>
  </section>
  <footer>
    <div id="selectedArea"></div>
    <section id="footerContainer">
      <a href="#homePage" id="homePageFooter" class="selected">
        <div class="icon-home"></div>
        <p>الرئيسية</p>
      </a>
      <a href="#rankPage" id="rankPageFooter">
        <div class="icon-trophy"></div>
        <p>المراكز</p>
      </a>
      <a id="qrScanFooter">
        <div class="icon-qr"></div>
        <p>شكان QR</p>
      </a>
      <a href="#comunityPage" id="comunityPageFooter">
        <div class="icon-comunity"></div>
        <p>المجتمع</p>
      </a>
      <a href="#profilePage" id="profilePageFooter">
        <div class="icon-user"></div>
        <p>الحساب</p>
      </a>
    </section>
  </footer>

</html>
